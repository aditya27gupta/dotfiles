format = """
$username\
$directory\
$git_branch\
$git_status\
$docker_context\
$cmd_duration\
\n$character\
"""

# You can also replace your username with a neat symbol like п„   or disable this
# and use the os module below
[username]
show_always = true
style_user = "fg:#0E9AA7 bold"
style_root = "fg:#FE8A71 bold"
format = '[$user ]($style)'
disabled = false

[directory]
style = "fg:#B7C6E7"
format = "[in $path ]($style)"
truncation_length = 3
truncation_symbol = ""

[docker_context]
symbol = "пҢҲ "
style = "bg:#06969A"
format = '[ $symbol $context ]($style) $path'

[git_branch]
symbol = 'оӮ  '
style = "fg:#FCA17D"
format = '[ on $symbol$branch ]($style)'

[git_status]
conflicted = "уұ ұ "
ahead = "вҮЎ $count "
behind = "вҮЈ $count "
untracked = "пҒҮ Г—${count} "
stashed = "уұүј "
modified = "п„¶ Г—${count} "
staged = "оӯ„ Г—${count} "
renamed = "пҒӯ Г—${count} "
deleted = "оӘҒ Г—${count} "
style = "bright-white"
format = "$all_status$ahead_behind"

[cmd_duration]
min_time = 1
show_milliseconds = false
disabled = false
style = "bold italic red"

[character]
success_symbol = "[вһң](bold green)"
error_symbol = "[вң–](bold red)"
vimcmd_symbol = "[<](bold green)"
